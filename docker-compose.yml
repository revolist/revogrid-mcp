services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: revogrid-mcp-postgres
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/revolist/revogrid-mcp:latest
    container_name: revogrid-mcp-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REVOGRID_SOURCE_ROOT: /app/external/revogrid
      REVOGRID_PRO_SOURCE_ROOT: /app/external/revogrid-pro
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - '${APP_PUBLISHED_PORT:-8787}:8787'
    volumes:
      - ./data:/app/data
      - ${LOCAL_REVOGRID_SOURCE_PATH:-./external/revogrid}:/app/external/revogrid
      - ${LOCAL_REVOGRID_PRO_SOURCE_PATH:-./external/revogrid-pro}:/app/external/revogrid-pro
    labels:
      traefik.enable: ${TRAEFIK_ENABLE:-false}
      traefik.http.routers.revogrid-mcp.rule: Host(`${TRAEFIK_HOST:-revogrid-mcp.localhost}`)
      traefik.http.routers.revogrid-mcp.entrypoints: ${TRAEFIK_ENTRYPOINTS:-web}
      traefik.http.routers.revogrid-mcp.service: revogrid-mcp
      traefik.http.services.revogrid-mcp.loadbalancer.server.port: '8787'
      traefik.http.routers.revogrid-mcp.tls: ${TRAEFIK_TLS:-false}
    command: pnpm start

  reindex:
    image: ghcr.io/revolist/revogrid-mcp:latest
    profiles: ['jobs']
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REVOGRID_SOURCE_ROOT: /app/external/revogrid
      REVOGRID_PRO_SOURCE_ROOT: /app/external/revogrid-pro
    depends_on:
      - postgres
    networks:
      - internal
    volumes:
      - ./data:/app/data
      - ${LOCAL_REVOGRID_SOURCE_PATH:-./external/revogrid}:/app/external/revogrid
      - ${LOCAL_REVOGRID_PRO_SOURCE_PATH:-./external/revogrid-pro}:/app/external/revogrid-pro
    command: pnpm reindex

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
