name: CI

on:
  push:
    paths:
      - 'revogrid-mcp/**'
  pull_request:
    paths:
      - 'revogrid-mcp/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: revogrid-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: revogrid-mcp/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
